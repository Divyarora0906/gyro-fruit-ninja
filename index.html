<!doctype html>
<html>
  <head>
    <title>Host</title>
  </head>
  <body>
    <button id="createRoomBtn">Create Room</button>
    <h1>Host</h1>

    <p>
      Room:
      <span id="roomId"></span>
    </p>

    <p id="status">Waiting for phone...</p>

    <div id="qrcode"></div>
    <h2>Sensors</h2>

    <p>
      Alpha:
      <span id="alpha">0</span>
    </p>

    <p>
      Beta:
      <span id="beta">0</span>
    </p>

    <p>
      Gamma:
      <span id="gamma">0</span>
    </p>
    <p>AX: <span id="ax">0</span></p>
    <p>AY: <span id="ay">0</span></p>
    <p>AZ: <span id="az">0</span></p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module" src="./js/host.js"></script>
  </body>
</html>
