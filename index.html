<!doctype html>
<html>
  <head>
    <title>Fruit Ninja Host</title>
    <style>
      body {
        font-family: sans-serif;
        background: #222;
        color: #fff;
        margin: 20px;
      }
      #game-container {
        width: 800px;
        height: 500px;
        position: relative;
        border: 3px solid #444;
        border-radius: 8px;
        overflow: hidden;
      }
      #arena {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      #startOverlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.75);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #startGameBtn {
        padding: 15px 35px;
        font-size: 24px;
        font-weight: bold;
        background: #ff9800;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(255,152,0,0.4);
      }
      #startGameBtn:hover { background: #e65100; }
      #ui-panel { display: flex; gap: 20px; margin-bottom: 15px; }
      .hud { background: #333; padding: 10px 20px; border-radius: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <h1>Fruit Ninja WebRTC</h1>

    <div id="ui-panel">
      <div class="hud">Room: <span id="roomId" style="font-weight:bold;color:#ff9800;">-</span></div>
      <div class="hud">Status: <span id="status">Waiting...</span></div>
      <div class="hud">Score: <span id="scoreText">0</span></div>
    </div>

    <div id="qrcode" style="margin-bottom: 15px;"></div>
    <button id="createRoomBtn" style="padding:10px; margin-bottom:10px;">1. Connect System</button>

    <div id="game-container">
      <div id="arena"></div>
      <div id="startOverlay" style="display: none;">
        <h2 style="margin-bottom:20px;">2. Phone Connected!</h2>
        <button id="startGameBtn">Start Game ⚔️</button>
      </div>
    </div>

    <script type="module" src="./js/host.js"></script>
  </body>
</html>
