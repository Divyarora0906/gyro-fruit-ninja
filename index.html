<!doctype html>
<html>
  <head>
    <title>Fruit Ninja Dojo</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        background: #1e1e24;
        color: #fff;
        margin: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #game-container {
        width: 800px;
        height: 500px;
        position: relative;
        border: 4px solid #5c4033; /* Dark Wood Border */
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }
      #arena {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      #arena canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #startOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #startGameBtn {
        padding: 15px 40px;
        font-size: 26px;
        font-weight: bold;
        background: linear-gradient(135deg, #ff9800 0%, #e65100 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        transition: transform 0.1s;
      }
      #startGameBtn:hover {
        transform: scale(1.05);
      }
      #ui-panel {
        display: flex;
        gap: 20px;
        width: 800px;
        justify-content: space-between;
        margin-bottom: 15px;
      }
      .hud {
        background: #2a2a35;
        padding: 12px 25px;
        border-radius: 6px;
        border: 1px solid #444;
        font-size: 18px;
      }
      #qrcode {
        background: white;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: inline-block;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <h1>NINJA DOJO ARENA</h1>

    <div id="ui-panel">
      <div class="hud">
        ROOM:
        <span id="roomId" style="color: #ff9800; font-weight: bold">-</span>
      </div>
      <div class="hud">STATUS: <span id="status">INIT...</span></div>
      <div class="hud">
        SCORE:
        <span id="scoreText" style="color: #4caf50; font-weight: bold">0</span>
      </div>
    </div>

    <div style="text-align: center; width: 800px">
      <button
        id="createRoomBtn"
        style="
          padding: 10px 20px;
          font-weight: bold;
          cursor: pointer;
          margin-bottom: 15px;
        "
      >
        1. Start Dojo Signaling Server
      </button>
      <div id="qrcode"></div>
    </div>

    <div id="game-container">
      <div id="arena"></div>
      <div id="startOverlay" style="display: none">
        <h2 style="color: #ff9800; font-size: 28px; margin-bottom: 20px">
          ⚔️ SWORD LINKED Successfully! ⚔️
        </h2>
        <button id="startGameBtn">ENTER DOJO</button>
      </div>
    </div>

    <script type="module" src="./js/host.js"></script>
  </body>
</html>
